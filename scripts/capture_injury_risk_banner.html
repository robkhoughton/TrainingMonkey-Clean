<!DOCTYPE html>
<html>
<head>
    <title>Capture Injury Risk Banner</title>
    <script src="https://cdn.jsdelivr.net/npm/playwright@1.57.0/lib/server/injected/injectedScript.js"></script>
</head>
<body>
<script type="module">
    import { chromium } from 'https://cdn.jsdelivr.net/npm/playwright@1.57.0/+esm';

    async function capture() {
        const browser = await chromium.launch({ headless: false });
        const page = await browser.newPage({ viewport: { width: 1440, height: 900 } });

        await page.goto('http://localhost:5001/dashboard');
        await page.waitForLoadState('networkidle');
        await page.waitForTimeout(2000);

        // Close modal if present
        try {
            await page.evaluate(() => {
                localStorage.setItem('dashboardTour_completed', 'true');
            });
            await page.reload();
            await page.waitForLoadState('networkidle');
        } catch (e) {}

        // Find and screenshot the banner
        const banner = await page.locator('.CompactDashboardBanner, [class*="injury-risk"]').first();
        await banner.screenshot({ path: 'injury_risk_banner.png' });

        await browser.close();
    }

    capture();
</script>
</body>
</html>
